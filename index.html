<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saranya Anantapantula</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e8e8e8;
            --text-dim: #6a6a6a;
            --accent: #ffffff;
            --hover: #3a3a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .name {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .tagline {
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--text-dim);
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
            animation-delay: 0.15s;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        nav a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0;
            border-top: 1px solid #1a1a1a;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        nav a:nth-child(1) { animation-delay: 0.3s; }
        nav a:nth-child(2) { animation-delay: 0.4s; }
        nav a:nth-child(3) { animation-delay: 0.5s; }

        nav a:last-child {
            border-bottom: 1px solid #1a1a1a;
        }

        nav a:hover {
            padding-left: 1rem;
            color: var(--accent);
        }

        nav a span.label {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        nav a span.count {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 300;
        }

        nav a span.arrow {
            font-size: 1.2rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        nav a:hover span.arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.75rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
            animation-delay: 0.7s;
        }

        .footer a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--text);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle grain overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            .footer {
                flex-direction: column;
                align-items: center;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">Saranya Anantapantula</h1>
        <p class="tagline">systems · markets · science</p>
        
        <nav>
            <a href="markets.html">
                <span class="label">
                    Markets
                    <span class="count">trading, quant research</span>
                </span>
                <span class="arrow">→</span>
            </a>
            <a href="research.html">
                <span class="label">
                    Research
                    <span class="count">statistics, modeling, publications</span>
                </span>
                <span class="arrow">→</span>
            </a>
            <a href="building.html">
                <span class="label">
                    Building
                    <span class="count">startups, patents, media</span>
                </span>
                <span class="arrow">→</span>
            </a>
        </nav>
    </div>

    <div class="footer">
        <a href="mailto:anantsar@wharton.upenn.edu">email</a>
        <a href="https://github.com/anantapantulasa" target="_blank">github</a>
        <span style="color: #3a3a3a;">Systems Engineering & Finance @ Penn M&T '28</span>
    </div>
</body>
</html>
